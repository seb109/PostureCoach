services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: posturecoach
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/posturecoach
      JWT_SECRET_KEY: local-dev-secret-change-me
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/api/v1/stream
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
